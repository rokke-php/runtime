name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (PHP-CS-Fixer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: swoole-5.1.2
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-lint-${{ hashFiles('composer.json') }}
          restore-keys: composer-lint-
      - run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader
      - run: composer lint

  analyse:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: swoole-5.1.2
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-analyse-${{ hashFiles('composer.json') }}
          restore-keys: composer-analyse-
      - run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader
      - run: composer analyse

  test:
    name: Tests (PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: swoole-5.1.2
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-test-${{ hashFiles('composer.json') }}
          restore-keys: composer-test-
      - run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader
      - run: composer test
