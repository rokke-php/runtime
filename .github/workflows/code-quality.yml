name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  phpstan:
    name: PHPStan (SARIF)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: swoole-5.1.2
          coverage: none
          tools: composer:v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: vendor
          key: composer-quality-${{ hashFiles('composer.json') }}
          restore-keys: composer-quality-
      - run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader
      - name: Run PHPStan and emit JSON
        run: vendor/bin/phpstan analyse --error-format=json --no-progress --memory-limit=2G > /tmp/phpstan.json 2>&1 || true
      - name: Convert PHPStan JSON to SARIF
        run: |
          php -r '
          $json = json_decode(file_get_contents("/tmp/phpstan.json"), true);
          $results = [];
          foreach ($json["files"] ?? [] as $file => $data) {
              foreach ($data["messages"] ?? [] as $msg) {
                  $results[] = [
                      "ruleId" => "phpstan",
                      "message" => ["text" => $msg["message"]],
                      "locations" => [[
                          "physicalLocation" => [
                              "artifactLocation" => ["uri" => ltrim(str_replace(getcwd(), "", $file), "/")],
                              "region" => ["startLine" => $msg["line"] ?? 1]
                          ]
                      ]]
                  ];
              }
          }
          $sarif = [
              "\$schema" => "https://json.schemastore.org/sarif-2.1.0",
              "version" => "2.1.0",
              "runs" => [["tool" => ["driver" => ["name" => "PHPStan", "version" => "1.x", "rules" => []]], "results" => $results]]
          ];
          file_put_contents("/tmp/phpstan.sarif", json_encode($sarif, JSON_PRETTY_PRINT));
          '
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: /tmp/phpstan.sarif
          category: code-quality
